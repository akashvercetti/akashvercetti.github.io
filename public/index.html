<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta Tags -->
    <meta charset="utf-8" />
    <meta name="google-site-verification" content="2ZxOsd-fnUTGKfc-3T3nqE2C_RFiRwPHTxz0qLCUwLI" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Pulstral is your all-in-one gaming companion. Deals, free games, Steam stats, esports scores, news, trailers, and more — all in one free app." />
    <meta name="keywords" content="gaming app, game deals, free games, Steam stats, esports, gaming news, game trailers, price tracker, Pulstral" />
    <meta name="author" content="Pulstral Team" />

    <!-- Open Graph Meta Tags for Social Media -->
    <meta property="og:title" content="Pulstral - Your Gaming Life, One Place" />
    <meta property="og:description" content="Deals, free games, Steam stats, esports scores, gaming news, and more — all in one free app. No account required." />
    <meta property="og:image" content="https://akashvercetti.github.io/logo512.png" />
    <meta property="og:url" content="https://akashvercetti.github.io/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pulstral" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulstral - Your Gaming Life, One Place" />
    <meta name="twitter:description" content="Deals, free games, Steam stats, esports scores, gaming news, and more — all in one free app." />
    <meta name="twitter:image" content="https://akashvercetti.github.io/logo512.png" />
    <meta name="twitter:url" content="https://akashvercetti.github.io/" />

    <!-- Canonical URL (this site) -->
    <link rel="canonical" href="https://akashvercetti.github.io/" />

    <!-- Apple Meta Tags -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Title -->
    <title>Pulstral - Your Gaming Life, One Place</title>

    <!-- SPA redirect: restores the deep-link path stashed by 404.html -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
